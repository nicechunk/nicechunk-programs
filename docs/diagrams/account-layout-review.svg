<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Account layout review path</title>
  <desc id="desc">A diagram showing how Rust account state, magic headers, fixed byte lengths, SDK decoders, scripts, and tests stay aligned.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#070d14"/><stop offset="1" stop-color="#14170d"/></linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#8fdcff"/></marker>
    <style>.label{font:800 12px Inter,ui-sans-serif,system-ui,sans-serif;letter-spacing:.16em;fill:#90ff1a}.title{font:850 42px Inter,ui-sans-serif,system-ui,sans-serif;fill:#f3f8ff}.copy{font:500 17px Inter,ui-sans-serif,system-ui,sans-serif;fill:#b8c7d4}.card{fill:rgba(255,255,255,.06);stroke:rgba(255,255,255,.16);stroke-width:1.2;rx:18}.head{font:800 18px Inter,ui-sans-serif,system-ui,sans-serif;fill:#f3f8ff}.small{font:600 13px Inter,ui-sans-serif,system-ui,sans-serif;fill:#bdd0df}.mono{font:750 13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#f7d98f}.line{stroke:#8fdcff;stroke-width:3;fill:none;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1060" cy="120" r="260" fill="#83ff00" opacity=".08"/><circle cx="220" cy="612" r="280" fill="#00c2ff" opacity=".08"/>
  <text x="70" y="78" class="label">ACCOUNT LAYOUT DISCIPLINE</text>
  <text x="70" y="132" class="title">Every account format needs a review trail.</text>
  <text x="70" y="168" class="copy">The protocol is easier to audit when Rust packing, SDK decoding, scripts, and tests expose the same byte contract.</text>
  <g transform="translate(82 258)"><rect class="card" width="214" height="190"/><text x="24" y="42" class="head">Rust state</text><text x="24" y="78" class="mono">state.rs</text><text x="24" y="108" class="small">pack / unpack</text><text x="24" y="138" class="small">magic headers</text><text x="24" y="168" class="small">fixed lengths</text></g>
  <path class="line" d="M296 354 H370"/>
  <g transform="translate(392 226)"><rect class="card" width="230" height="254"/><text x="24" y="42" class="head">Instruction layer</text><text x="24" y="78" class="small">tagged payloads</text><text x="24" y="108" class="small">PDA validation</text><text x="24" y="138" class="small">owner checks</text><text x="24" y="168" class="small">rent creation</text><text x="24" y="202" class="mono">process_instruction</text></g>
  <path class="line" d="M622 354 H696"/>
  <g transform="translate(718 226)"><rect class="card" width="230" height="254"/><text x="24" y="42" class="head">SDK mirror</text><text x="24" y="78" class="small">decoder offsets</text><text x="24" y="108" class="small">PDA derivation</text><text x="24" y="138" class="small">instruction builders</text><text x="24" y="168" class="small">program constants</text><text x="24" y="202" class="mono">offset !== LEN fails</text></g>
  <path class="line" d="M948 354 H1022"/>
  <g transform="translate(1044 258)"><rect class="card" width="168" height="190"/><text x="24" y="42" class="head">Evidence</text><text x="24" y="78" class="small">tests</text><text x="24" y="108" class="small">scripts</text><text x="24" y="138" class="small">docs</text><text x="24" y="168" class="small">fixtures</text></g>
  <text x="312" y="608" class="copy">A layout change is not done until every consumer that reads the bytes changes in the same review.</text>
</svg>
