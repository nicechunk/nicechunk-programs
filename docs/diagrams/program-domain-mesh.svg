<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Program domain mesh</title>
  <desc id="desc">A diagram showing NiceChunk Solana programs split by domain: core config, player profile, chunk state, Guardian registry, backpack storage, and marketplace listings.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070d14"/>
      <stop offset="1" stop-color="#14170d"/>
    </linearGradient>
    <style>
      .label{font:800 12px Inter,ui-sans-serif,system-ui,sans-serif;letter-spacing:.16em;fill:#90ff1a}
      .title{font:850 42px Inter,ui-sans-serif,system-ui,sans-serif;fill:#f3f8ff}
      .copy{font:500 17px Inter,ui-sans-serif,system-ui,sans-serif;fill:#b8c7d4}
      .core{fill:#0d1a22;stroke:#8fdcff;stroke-width:2;rx:22}
      .node{fill:rgba(255,255,255,.06);stroke:rgba(255,255,255,.16);stroke-width:1.2;rx:18}
      .head{font:800 18px Inter,ui-sans-serif,system-ui,sans-serif;fill:#f3f8ff}
      .small{font:600 13px Inter,ui-sans-serif,system-ui,sans-serif;fill:#bdd0df}
      .mono{font:750 13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#f7d98f}
      .wire{stroke:#8fdcff;stroke-width:2.5;fill:none}
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="70" y="78" class="label">NATIVE SOLANA PROGRAMS</text>
  <text x="70" y="132" class="title">Persistent game state is split by protocol domain.</text>
  <text x="70" y="168" class="copy">Each program owns a small state surface, while SDK decoders and tests keep account layout changes visible.</text>
  <rect x="526" y="294" width="228" height="128" class="core"/>
  <text x="590" y="346" class="head">Core</text>
  <text x="562" y="378" class="small">sealed GlobalConfig</text>
  <text x="578" y="402" class="mono">NCKCFG01</text>

  <rect x="92" y="246" width="250" height="130" class="node"/><text x="122" y="292" class="head">Player</text><text x="122" y="326" class="small">profile, equipment, session</text><text x="122" y="352" class="mono">player/session PDA</text>
  <rect x="92" y="466" width="250" height="130" class="node"/><text x="122" y="512" class="head">Chunk</text><text x="122" y="546" class="small">block deltas and mining</text><text x="122" y="572" class="mono">chunk PDA</text>
  <rect x="482" y="502" width="316" height="118" class="node"/><text x="512" y="546" class="head">Backpack</text><text x="512" y="578" class="small">portable resource records</text>
  <rect x="938" y="246" width="250" height="130" class="node"/><text x="968" y="292" class="head">Guardian</text><text x="968" y="326" class="small">registry and region stake</text><text x="968" y="352" class="mono">region PDA</text>
  <rect x="938" y="466" width="250" height="130" class="node"/><text x="968" y="512" class="head">Market</text><text x="968" y="546" class="small">listings and settlement</text><text x="968" y="572" class="mono">listing PDA</text>
  <path class="wire" d="M342 310 C430 310 468 330 526 348"/>
  <path class="wire" d="M342 532 C440 510 500 448 558 408"/>
  <path class="wire" d="M640 502 V422"/>
  <path class="wire" d="M754 348 C814 330 856 310 938 310"/>
  <path class="wire" d="M722 408 C800 452 862 510 938 532"/>
</svg>
